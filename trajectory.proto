edition = "2023";

package auralreality;

import "vector.proto";
import "transform.proto";

message TrajectoryPoint {
  Vector anchor = 1;
  Vector control_before = 2;
  Vector control_after = 3;
  float time = 4;

  // TODO:
  // - do we track orientation, and if so, on anchor+controls or only on the anchor?
  // - do we track scale?
}

message Trajectory {
  string id = 1;
  Transform transform = 2;
  repeated TrajectoryPoint points = 3;
  bool closed = 4;
}
