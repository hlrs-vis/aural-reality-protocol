name: Compile Protobufs

on:
    push:
        paths:
            - "**/*.proto"
            - ".github/workflows/actions.yml"
    workflow_dispatch:

jobs:
    protoc:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install protobuf compiler
              run: |
                  PB_REL="https://github.com/protocolbuffers/protobuf/releases"
                  PB_VER="34.1"
                  curl -sL -o protoc.zip $PB_REL/download/v$PB_VER/protoc-$PB_VER-linux-x86_64.zip
                  unzip protoc.zip -d $HOME/.local
                  protoc --version

            - name: Compile all .proto files to build/
              run: |
                  mkdir -p build
                  mapfile -t PROTO_FILES < <(find . -type f -name "*.proto")
                  if [ "${#PROTO_FILES[@]}" -eq 0 ]; then
                      echo "No .proto files found."
                      exit 1
                  fi
                  protoc \
                      --proto_path=. \
                      --include_imports \
                      --descriptor_set_out=build/protos.pb \
                      "${PROTO_FILES[@]}"
