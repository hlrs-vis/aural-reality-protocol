edition = "2023";

package auralreality;

import "utils.proto";
import "transform.proto";
import "listener.proto";
import "source.proto";
import "speaker.proto";
import "trajectory.proto";
import "audio_file.proto";
import "playback_config.proto";

service TMTService {
  rpc Ping(Id) returns (Id) {
  }

  // Read, modify and delete sources
  rpc GetSourceIds(Empty) returns (IdList) {
  }
  rpc GetSource(Id) returns (Source) {
  }
  rpc UpdateSource(Source) returns (Source) {
  }
  rpc DeleteSource(Id) returns (Empty) {
  }

  // Read, modify and delete speakers
  rpc GetSpeakerIds(Empty) returns (IdList) {
  }
  rpc GetSpeaker(Id) returns (Speaker) {
  }
  rpc UpdateSpeaker(Speaker) returns (Speaker) {
  }
  rpc DeleteSpeaker(Id) returns (Empty) {
  }

  // Read, modify and delete trajectories
  rpc GetTrajectoryIds(Empty) returns (IdList) {
  }
  rpc GetTrajectory(Id) returns (Trajectory) {
  }
  rpc UpdateTrajectory(Trajectory) returns (Trajectory) {
  }
  rpc DeleteTrajectory(Id) returns (Empty) {
  }

  // Transmit audio file for playback
  rpc UploadAudioFile(AudioFile) returns (Id) {
  }
}
